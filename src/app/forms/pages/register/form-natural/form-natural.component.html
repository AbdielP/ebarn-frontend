<main class="container">
    <form action="">
        <div class="row card-group">
            <div class="card col-md-3 p-0 bg-success">
                <div class="d-flex flex-column">
                    <div class="d-flex justify-content-start align-items-center borde p-4">
                        <span class='badge badge-light font-options  badge-pill mx-3 display-4'>1</span>
                        <p class="text-light lead m-0">Información personal</p>
                    </div>
                    <div class="d-flex justify-content-start align-items-center borde p-4">
                        <span class='badge badge-light font-options  badge-pill mx-3'>2</span>
                        <p class="text-light lead m-0">Dirección</p>
                    </div>
                    <div class="d-flex justify-content-start align-items-center p-4">
                        <span class='badge badge-light font-options  badge-pill mx-3'>3</span>
                        <p class="text-light lead m-0">Contacto</p>
                    </div>
                </div>
            </div>
            <div class="card col-md-9">
                <div class="row d-flex flex-column justify-content-center align-items-center">
                    <h4 class="text-success mt-5">Información Personal</h4>
                    <p class="text-center">Por favor, introduzca su información personal para poder continuar con el registro y creación de su cuenta.</p>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="opcion1">Opción 1.</label> <br>
                        <input id="opcion1" class="form-control form-control-sm" type="text" name="op1" placeholder="Opción/respuesta #1">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="opcion2">Opción 2.</label> <br>
                        <input id="opcion2" class="form-control form-control-sm" type="text" name="op2" placeholder="Opción/respuesta #2">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="opcion3">Opción 3.</label> <br>
                        <input id="opcion3" class="form-control form-control-sm" type="text" name="op3" placeholder="Opción/respuesta #3">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="opcion4">Opción 4.</label> <br>
                        <input id="opcion4" class="form-control form-control-sm" type="text" name="op4" placeholder="Opción/respuesta #4">
                    </div>
                    <div class="col-md-12">
                        <small>Si la pregunta simple o multiple tiene menos de 4 opciones, deje vacíos los campos que no requiera.</small>
                    </div>
                </div>
            </div>
        </div>
        
    </form>
    
</main>
