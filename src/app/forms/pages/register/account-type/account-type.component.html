<div class="col-md-9">
    <div *ngFor="let typeacc of typeAccounts" class="mb-3 opaco account-card" (click)="getTypeAcc(typeacc)">
        <img class="card-img-top" src="../../../../assets/img/temporal.png" alt="Card image cap">
        <div class="card-body">
          <h4 class="card-title text-info">{{typeacc.title | titlecase }}</h4>
          <p class="lead">{{typeacc.info}}</p>
          <hr>
          <p class="card-text"><small class="text-muted">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Fuga, eveniet.</small></p>
        </div>
    </div>
</div>
