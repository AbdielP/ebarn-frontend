<div *ngFor="let offert of offerts" class='card flex-md-row mb-1 box-shadow h-md-250 border-light opaco'>
    <img class='card-img-left mt-4 d-none d-md-block' src="../../../../../assets/img/{{offert.codpr}}.png" height='100' alt='Card image cap'>
    <div class='card-body d-flex flex-column align-items-start'>
    
        <strong class='d-inline-block mb-2 text-primary text-uppercase'>{{offert.codpr}}</strong>
        
        <h3 class='mb-0'>
    
        <h4 class='text-dark'>{{offert.prod}}</h4>
        
        </h3>
    
        <div class='mb-1 text-muted'>Fecha publicación: {{offert.createdAt | date:'short'}}</div>
        <p class='card-text mb-auto pb-2'>{{offert.info}}</p>
        <h6 class='card-subtitle mt-1 text-success'>{{offert.precio}}$ (USD) Precio por libra.</h6>
        
        </div>
        <div class='card-body card-productor'>
            <h4 class='d-flex justify-content-between align-items-center mb-3'>
            <span class='text-muted'>Precio</span>
        
            <span class='badge badge-primary badge-pill'>$ {{offert.precio}}</span>
            
            </h4>
            <ul class='list-group mb-3'>
                <li class='list-group-item d-flex justify-content-between lh-condensed'>
                <div>
            
                    <h6 class='my-0 text-info text-capitalize'>{{offert.nombre}} {{offert.apellido}}</h6>
                    <small class='text-muted'>{{offert.corel}}</small>
                
                </div>
            
                <span class='text-primary h6'>${{offert.precio}}</span>
                
                </li>
            </ul>
            <div class='d-flex justify-content-around'>
                <button type='button' class='btn btn-primary btn-sm'><i class='fas fa-shopping-basket'></i> Ver oferta</button>
                <button type='button' class='btn btn-success btn-sm'><i class='fas fa-id-card-alt'></i> Ver datos del productor</button>
            </div>
       
        </div>
    </div>
