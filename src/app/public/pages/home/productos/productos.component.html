<div *ngIf="infocategory != ''">
  <div class="row mt-3">
    <div class="col-md-12">
      <p class="text-light text-center card-title bg-primary p-1"><b>{{infocategory.catg}} disponibles.</b></p>
    </div>
  </div>
  <div class="mb-3 p-3 rounded opaco">
    <h6 class="border-bottom border-gray pb-2 mb-0">Listado de ofertas de {{infocategory.catg | lowercase }} disponibles.</h6>
    <div class="row d-flex">
      <ng-container *ngIf="products != ''">
        <div *ngFor="let product of products" class="media text-muted col-md-4 pt-3">
          <img src="../../../../assets/img/{{product.img}}" height="30" alt="" class="mr-2 rounded">
          <div class="media-body pb-2 mb-0 small lh-125 border-bottom border-gray">
            <div class="d-flex justify-content-between align-items-center w-100">
              <strong class="text-gray-dark">{{product.prod}}</strong>
              <a [routerLink]="['/ofertas', product.codpr]">Ver ofertas</a>
            </div>
            <span class="d-block">@{{product.info}}</span>
          </div>
        </div>
      </ng-container>
      
      <div *ngIf="products == ''" class="col-md-12">
        <div class="d-flex justify-content-center align-items-center">
          <small class="text-info lead p-3"><i class="far fa-bell text-success"></i> No hay productos disponibles en esta categoría.</small>
        </div>
      </div>
          
    </div>
      <!-- <small class="d-block text-right mt-2">
        <a href="#">Paginación aquí...</a>
      </small> -->
  </div>

</div>
