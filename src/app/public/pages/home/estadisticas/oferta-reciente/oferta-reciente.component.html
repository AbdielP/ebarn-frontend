<div *ngIf="ofertaReciente != ''" class="card flex-md-row">
    <div class="card-body col-md-7 pb-0 mb-0">
        <h4 class="card-title text-secondary"><i class="far fa-clock"></i> Oferta más reciente</h4>
        <hr>
        <div class="row">
            <h6 class="card-subtitle mb-2 ml-3 text-secondary">Producto:</h6>
            <h6 class='card-subtitle mb-2 ml-3 text-info'>{{ofertaReciente.prod}}</h6>
        </div>
        <p class='card-text'>{{ofertaReciente.descripcion}}</p>
        <button type='button' class='btn btn-sm btn-light'>
            Cantidad <span class='badge badge-info'>{{ofertaReciente.qty}}</span>
        </button>
        <button type='button' class='btn btn-sm btn-light'>
            <span class='badge badge-info text-capitalize'>{{ofertaReciente.unt}}</span>
        </button>
    </div>
    <div class="card-body col-md-5 pb-0 mb-0">
        <div class="order-md-2 mb-4">
            <h4 class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted">Precio</span>
            <span class='badge badge-primary badge-pill'>{{ofertaReciente.precio}} USD</span>
            </h4>
            <ul class="list-group mb-3">
                <li class="list-group-item d-flex justify-content-between lh-condensed">
                    <div>
                    <h6 class='my-0 text-info text-capitalize'>{{ofertaReciente.nmb}} {{ofertaReciente.apll}}</h6>
                    <small class='text-muted'>{{ofertaReciente.corel}}</small>
                    </div>
                    <span class='text-primary h6'>${{ofertaReciente.precio}}</span>
                </li>
            </ul>
            <p class='card-text'>{{ofertaReciente.info}}</p>
        </div>
    </div>
</div>
